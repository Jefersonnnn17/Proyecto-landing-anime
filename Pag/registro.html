<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Oficial - Anime Fest 2026</title>
    <link rel="stylesheet" href="../Css/registro.css">
</head>
<body>
    <div class="form-wrapper">
        <div class="form-box">
            <header class="form-header">
                <h1>Únete a la <span>Legión</span></h1>
                <p>Completa tu inscripción para el evento en Chuquiago Marka</p>
            </header>

            <form action="#" class="main-form">
                <div class="input-group">
                    <label for="nombre">Nombre de Ninja:</label>
                    <input type="text" id="nombre" placeholder="Ej. Itachi Uchiha" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" placeholder="tu@aldea.com" required>
                </div>

                <div class="input-group">
                    <label for="aldea">Aldea de procedencia:</label>
                    <select id="aldea">
                        <option value="hoja">Aldea de la Hoja (La Paz)</option>
                        <option value="arena">Aldea de la Arena (Oruro/Potosí)</option>
                        <option value="nube">Aldea de la Nube (El Alto)</option>
                        <option value="otra">Otras Aldeas</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="entrada">Rango de Entrada:</label>
                    <div class="radio-options">
                        <label><input type="radio" name="rango" value="genin" checked> Genin (General)</label>
                        <label><input type="radio" name="rango" value="kage"> Kage (VIP)</label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">INVOCAR ENTRADA</button>
            </form>
            <a href="../index.html" class="back-link">← Cancelar y volver al inicio</a>
        </div>
    </div>
</body>
</html>
